# Parámetros iniciales para la generación de datos sintéticos.
# Estos valores se ajustarán cuando empecemos la fase de generación de datos.

project:
  scenario: retail_ecommerce
  random_seed: 20260707
  default_profile: dev

date_range:
  start_date: "2025-07-01"
  end_date: "2026-06-30"

profiles:
  dev:
    MSTR_ARTICULOS: 500
    MSTR_PROVEEDORES: 80
    MSTR_TIENDAS: 30
    CRM_MIEMBROS: 3000
    TRANS_VENTAS: 30000
    INV_STOCK_DIARIO: 40000
    POST_DEVOLUCIONES: 1500
  full:
    use_target_rows: true

tables:
  MSTR_ARTICULOS:
    target_rows: 5000
  MSTR_PROVEEDORES:
    target_rows: 800
  MSTR_TIENDAS:
    target_rows: 150
  CRM_MIEMBROS:
    target_rows: 50000
  TRANS_VENTAS:
    target_rows: 1000000
  INV_STOCK_DIARIO:
    target_rows: 750000
  POST_DEVOLUCIONES:
    target_rows: 50000

quality:
  controlled_null_rate: 0.05
  include_intentional_anomalies: true
